<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>TODO Carousel</title>
  <style>
    :root{
      --bg1:#070812;
      --bg2:#0e1230;
      --accent:#6cf1ff;
      --accent2:#ff70e7;
      --card:#ffffff0f;
      --stroke:#ffffff26;
      --txt:#eef0ff;
      --muted:#b9bfd8;
      --noise:.07;
    }

    *{box-sizing:border-box;}
    html,body{height:100%;}
    body{
      margin:0;
      color:var(--txt);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      overflow:hidden;
      background: radial-gradient(1100px 800px at 15% 10%, rgba(108,241,255,.22), transparent 65%),
                  radial-gradient(900px 700px at 80% 20%, rgba(255,112,231,.18), transparent 65%),
                  radial-gradient(800px 800px at 45% 75%, rgba(255,224,120,.12), transparent 55%),
                  linear-gradient(180deg, var(--bg1), var(--bg2));
      position:relative;
    }
    body::before{
      content:"";
      position:fixed;
      inset:-40px;
      background:conic-gradient(from 90deg,
        rgba(255,255,255,.15),
        rgba(108,241,255,.18),
        rgba(255,112,231,.22),
        rgba(255,224,120,.1),
        rgba(255,255,255,.15)
      );
      filter: blur(30px);
      opacity:.7;
      animation: hue 18s linear infinite;
      pointer-events:none;
    }
    body::after{
      content:"";
      position:fixed;
      inset:-2px;
      background:
        linear-gradient(rgba(255,255,255,0) 0, rgba(255,255,255,.08) 1px, rgba(0,0,0,0) 4px);
      background-size: 100% 6px;
      mix-blend-mode: screen;
      opacity:var(--noise);
      animation: scan 14s linear infinite;
      pointer-events:none;
    }

    .ui{
      position:absolute;
      inset:0;
      display:flex;
      flex-direction:column;
      padding:22px;
      pointer-events:none;
    }

    .bar{
      display:flex;
      align-items:center;
      gap:14px;
      pointer-events:auto;
    }
    .brand{
      font-weight:900;
      letter-spacing:.02em;
      text-transform:uppercase;
      font-size:14px;
      opacity:.85;
    }
    .wrap{
      display:flex;
      gap:10px;
      flex:1;
    }

    input{color:var(--txt);}
    .input{
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--stroke);
      background: rgba(0,0,0,.22);
      outline:none;
      width:240px;
    }
    .btn{
      cursor:pointer;
      border:none;
      padding:10px 12px;
      border-radius:12px;
      color:var(--bg1);
      background: linear-gradient(135deg, rgba(108,241,255,.95), rgba(255,112,231,.9));
      box-shadow: 0 18px 50px rgba(255,112,231,.15);
      font-weight:800;
    }
    .btn.ghost{
      background:rgba(255,255,255,.05);
      color:var(--txt);
      border:1px solid var(--stroke);
    }

    .hud{
      margin-top:10px;
      display:flex;
      gap:10px;
      pointer-events:auto;
    }
    .pill{
      padding:8px 10px;
      border-radius:999px;
      border:1px solid var(--stroke);
      background: rgba(0,0,0,.25);
      font-size:12px;
      color:var(--muted);
    }

    .scene{
      height: 100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      pointer-events:none;
    }

    .stage{
      pointer-events:auto;
      width:min(92vw, 1100px);
      height:min(78vh, 640px);
      perspective: 1400px;
      position:relative;
    }
    .ring{
      position:absolute;
      inset:0;
      transform-style: preserve-3d;
      transform: translateZ(calc(var(--radius, 400px)*-1));
      will-change: transform;
      transition: filter .35s ease;
    }

    .card{
      position:absolute;
      left:50%;
      top:50%;
      transform-style: preserve-3d;
      transform-origin:center center;
      width: 260px;
      height: 180px;
      border-radius: 16px;
      border:1px solid rgba(255,255,255,.22);
      background: linear-gradient(180deg, rgba(255,255,255,.12), rgba(0,0,0,.12));
      box-shadow: 0 25px 90px rgba(0,0,0,.45);
      overflow:hidden;
      cursor:pointer;
      opacity: .92;
    }

    .card::before{
      content:"";
      position:absolute;
      inset:-30%;
      background: radial-gradient(closest-side,
        rgba(108,241,255,.12),
        rgba(255,112,231,.08),
        transparent 62%
      );
      filter: blur(18px);
      animation: drift 9s ease-in-out infinite;
      opacity:.9;
    }

    .cardInner{
      position:absolute;
      inset:0;
      padding:16px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      backdrop-filter: blur(10px);
    }
    .title{font-weight:900; font-size:18px; line-height:1.12;}
    .desc{font-size:12px; color:var(--muted); opacity:.9;}
    .meta{display:flex; justify-content:space-between; align-items:center; gap:10px; color:var(--muted); font-size:12px;}

    .card.done{ border-color: rgba(255,224,120,.9); }
    .card.done .title{color:rgba(255,224,120,.92);}

    .toast{
      position:fixed;
      left:50%;
      bottom:18px;
      transform: translateX(-50%);
      padding: 10px 14px;
      border-radius: 999px;
      border:1px solid rgba(255,255,255,.22);
      background: rgba(0,0,0,.35);
      color: rgba(236,238,255,.95);
      font-size: 13px;
      pointer-events:none;
      opacity:0;
      animation: toast 1s ease both;
      display:none;
      box-shadow: 0 30px 80px rgba(0,0,0,.45);
    }

    @keyframes drift{0%{transform: translate3d(0,0,0) rotate(0deg);} 50%{transform: translate3d(18px,-20px,0) rotate(15deg);} 100%{transform: translate3d(-20px,12px,0) rotate(-8deg);} }
    @keyframes hue{from{filter:hue-rotate(0deg);} to{filter:hue-rotate(360deg);} }
    @keyframes scan{from{transform: translateY(0);} to{transform: translateY(140px);} }
    @keyframes toast{0%{opacity:0; transform: translateX(-50%) translateY(10px);} 15%{opacity:1; transform: translateX(-50%) translateY(0);} 85%{opacity:1;} 100%{opacity:0; transform: translateX(-50%) translateY(-6px);} }

    @media (prefers-reduced-motion: reduce){
      body::before, body::after{animation:none!important; filter:none!important; opacity:.18!important;}
      .card::before{animation:none!important;}
    }
  </style>
</head>
<body>
  <div class="ui">
    <div class="bar">
      <div class="brand">TODO Carousel</div>
      <input id="title" class="input" placeholder="タスク (例: ギャラリー回転を直す)">
      <input id="desc" class="input" placeholder="説明 (オプション)">
      <button class="btn" id="add">ADD</button>
      <button class="btn ghost" id="auto">AUTO</button>
      <button class="btn ghost" id="shuffle">SHUFFLE</button>
      <button class="btn ghost" id="reset">RESET</button>
      <button class="btn ghost" id="theme">THEME</button>
    </div>
    <div class="hud">
      <div class="pill" id="count">Tasks: 0</div>
      <div class="pill">左クリック: DONE / UNDO</div>
      <div class="pill">右クリック: DELETE</div>
      <div class="pill">ドラッグ: 回転</div>
      <div class="pill">H: Auto toggle</div>
    </div>
  </div>

  <div class="scene">
    <div class="stage" id="stage">
      <div class="ring" id="ring"></div>
    </div>
  </div>

  <div class="toast" id="toast" aria-live="polite"></div>

  <script>
  (function(){
    function $(id){return document.getElementById(id);} 
    const store='todo_carousel_v1';
    let tasks=[];

    // motion state
    let rotation=0;
    let target=0;
    let vel=0;
    let dragging=false;
    let lastX=0;
    let auto=true;

    // theme
    const themes=[
      ['#6cf1ff','#ff70e7'],
      ['#ffbf6b','#6df2b3'],
      ['#c76bff','#6bc3ff'],
    ];
    let themeIndex=0;

    const titleInput=$('title');
    const descInput=$('desc');
    const ring=$('ring');
    const stage=$('stage');
    const toastEl=$('toast');
    const countEl=$('count');

    function toast(msg){
      toastEl.textContent=msg;
      toastEl.style.display='block';
      toastEl.style.animation='none';
      void toastEl.offsetWidth;
      toastEl.style.animation='toast 1s ease both';
    }

    function save(){
      localStorage.setItem(store, JSON.stringify(tasks));
    }
    function load(){
      try{tasks=JSON.parse(localStorage.getItem(store)||'[]')||[];}catch(_){tasks=[];}
    }

    function clamp(n,a,b){return Math.max(a, Math.min(b,n));}
    function randInt(max){return Math.floor(Math.random()*max);}

    function applyTheme(){
      const t=themes[themeIndex];
      document.documentElement.style.setProperty('--accent', t[0]);
      document.documentElement.style.setProperty('--accent2', t[1]);
    }

    function render(){
      countEl.textContent='Tasks: '+tasks.length;
      ring.innerHTML='';

      const n=tasks.length || 1;
      const rect=stage.getBoundingClientRect();
      const radius=clamp(Math.floor(Math.min(rect.width, rect.height)*0.75), 280, 800);
      ring.style.setProperty('--radius', radius+'px');
      const step=360/n;

      tasks.forEach((t,i)=>{
        const card=document.createElement('div');
        card.className='card'+(t.done?' done':'');
        card.dataset.id=t.id;
        const deg=step*i;
        card.style.transform='translate(-50%, -50%) rotateY('+deg+'deg) translateZ('+radius+'px)';
        card.innerHTML=
          '<div class="cardInner">'+
            '<div class="title">'+escapeHtml(t.title||'TASK')+'</div>'+ 
            '<div class="desc">'+escapeHtml(t.desc||'')+'</div>'+ 
            '<div class="meta"><span>'+ (t.done?'DONE':'OPEN')+'</span><span>'+new Date(t.time||Date.now()).toLocaleTimeString()+'</span></div>'+ 
          '</div>';

        card.onclick=function(){
          t.done=!t.done;
          save();
          toast(t.done?'DONE':'UNDO');
          render();
        };
        card.oncontextmenu=function(e){
          e.preventDefault();
          tasks=tasks.filter(x=>x.id!==t.id);
          save();
          toast('DELETE');
          render();
        };
        ring.appendChild(card);
      });
    }

    function escapeHtml(s){
      return String(s).replace(/[&<>"']/g, function(c){
        return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'}[c]||c;
      });
    }

    // controls
    $('add').onclick=function(){
      const title=(titleInput.value||'').trim();
      const desc=(descInput.value||'').trim();
      if(!title){toast('タイトル入れて'); return;}
      tasks.unshift({
        id: Math.random().toString(16).slice(2),
        title,
        desc,
        done:false,
        time: Date.now()
      });
      titleInput.value='';
      descInput.value='';
      save();
      render();
      toast('ADDED');
    };

    $('auto').onclick=function(){
      auto=!auto;
      toast(auto?'AUTO':'PAUSE');
    };

    $('shuffle').onclick=function(){
      for(let i=tasks.length-1;i>0;i--){
        const j=randInt(i+1);
        const tmp=tasks[i];
        tasks[i]=tasks[j];
        tasks[j]=tmp;
      }
      save();
      render();
      toast('SHUFFLE');
    };

    $('reset').onclick=function(){
      if(!confirm('全部消します。よろしいですか？')) return;
      tasks=[];
      save();
      render();
      toast('RESET');
    };

    $('theme').onclick=function(){
      themeIndex=(themeIndex+1)%themes.length;
      applyTheme();
      toast('THEME '+(themeIndex+1));
    };

    document.addEventListener('keydown', function(e){
      if(e.key==='Enter' && document.activeElement===titleInput) $('add').click();
      if(e.key.toLowerCase()==='h') $('auto').click();
    });

    stage.addEventListener('pointerdown', function(e){
      dragging=true;
      lastX=e.clientX;
      stage.setPointerCapture && stage.setPointerCapture(e.pointerId);
    });
    stage.addEventListener('pointermove', function(e){
      if(!dragging) return;
      const dx=e.clientX-lastX;
      lastX=e.clientX;
      target += dx*0.35;
      vel = dx*0.35;
    });
    stage.addEventListener('pointerup', ()=>dragging=false);
    stage.addEventListener('pointercancel', ()=>dragging=false);

    function tick(){
      rotation += (target-rotation)*0.06 + vel*0.04;
      vel*=0.92;
      ring.style.transform='translateZ(calc(var(--radius)*-1)) rotateY('+rotation+'deg)';
      requestAnimationFrame(tick);
    }

    setInterval(function(){
      if(auto && !dragging){
        target += 0.65;
      }
    }, 16);

    window.addEventListener('resize', render);

    applyTheme();
    load();
    if(tasks.length===0){
      tasks=[
        {id:'a1', title:'Nebula Spin', desc:'回るToDo。ギャラリー感。', done:false, time:Date.now()},
        {id:'a2', title:'Light Pulse', desc:'カード光パルス', done:false, time:Date.now()},
        {id:'a3', title:'Drag Rotate', desc:'ドラッグで回転', done:false, time:Date.now()},
        {id:'a4', title:'Theme Cycle', desc:'THEMEボタン', done:false, time:Date.now()}
      ];
      save();
    }
    render();
    tick();
  })();
  </script>
</body>
</html>
