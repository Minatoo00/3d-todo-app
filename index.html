<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TODO Editions</title>
<style>
:root{
  --bg0:#f7f5ff;
  --bg1:#fbfaff;
  --fg:#0c0a1a;
  --muted: rgba(12,10,26,.65);
  --card: rgba(255,255,255,.76);
  --card2: rgba(255,255,255,.55);
  --stroke: rgba(12,10,26,.10);
  --shadow: 0 20px 80px rgba(12,10,26,.12);
  --accent:#00d26a;
  --a2:#7359ff;
  --a3:#00b3ff;
  --mx:50vw;
  --my:50vh;
  --rX:0deg;
  --rY:0deg;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
  color:var(--fg);
  background:
    radial-gradient(ellipse at 12% 10%, rgba(115,89,255,.20), transparent 54%),
    radial-gradient(circle at 86% 18%, rgba(0,179,255,.22), transparent 50%),
    radial-gradient(circle at 38% 90%, rgba(0,210,106,.18), transparent 55%),
    linear-gradient(180deg, var(--bg0), var(--bg1));
  background-size: 120% 120%;
  animation: hue 18s ease-in-out infinite alternate, driftBg 22s linear infinite;
  overflow:hidden;
}
body::before{
  content:"";
  position:fixed;
  inset:-40%;
  background: radial-gradient(closest-side at 40% 40%, rgba(255,255,255,.10), transparent 70%),
              radial-gradient(closest-side at 50% 50%, rgba(0,0,0,.08), transparent 72%);
  filter: blur(18px);
  transform: rotate(2deg);
  animation: float 9s ease-in-out infinite alternate;
  pointer-events:none;
}
body::after{
  content:"";
  position:fixed;
  inset:0;
  background: linear-gradient(rgba(12,10,26,.0), rgba(12,10,26,.06));
  mix-blend-mode:multiply;
  opacity:.20;
  pointer-events:none;
  animation: scan 7s linear infinite;
}
@keyframes driftBg{
  0% { background-position: 0% 0%; }
  50% { background-position: 100% 40%; }
  100%{ background-position: 0% 90%; }
}
@keyframes hue{
  0%{ filter:hue-rotate(0deg) saturate(1); }
  100%{ filter:hue-rotate(55deg) saturate(1.04); }
}
@keyframes float{
  0%{ transform: translate3d(-18%,8%,0) rotate(-2deg) scale(.98); opacity:.9;}
  100%{ transform: translate3d(14%,-10%,0) rotate(3deg) scale(1.06); opacity:.95;}
}
@keyframes scan{
  0%{ transform: translateY(-2%);}
  100%{ transform: translateY(2%);}
}
main{
  height:100%;
  display:grid;
  place-items:center;
  padding:34px 18px;
}
.stage{
  width: min(880px, 100%);
  border-radius: 26px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.82), rgba(255,255,255,.55)),
    radial-gradient(closest-side at 10% 20%, rgba(255,255,255,.40), transparent 68%);
  border:1px solid var(--stroke);
  box-shadow: var(--shadow);
  backdrop-filter: blur(12px);
  transform-style: preserve-3d;
  perspective: 1400px;
  transform: rotateX(var(--rX)) rotateY(var(--rY)) translateZ(0);
  transition: transform .16s ease;
  animation: stagePulse 6.5s ease-in-out infinite;
  position: relative;
  overflow: hidden;
}
.stage::after{
  content:"";
  position:absolute;
  inset:-40%;
  background: radial-gradient(circle at 50% 50%, rgba(255,255,255,.12), transparent 60%);
  animation: vignette 10s ease-in-out infinite alternate;
  pointer-events:none;
}
@keyframes vignette{
  0%{ transform: scale(1) rotate(0deg); opacity:.8;}
  100%{ transform: scale(1.12) rotate(6deg); opacity:.55;}
}
@keyframes stagePulse{
  0%,100%{ box-shadow: 0 20px 80px rgba(12,10,26,.10); border-color: rgba(12,10,26,.08);}
  50%{ box-shadow: 0 30px 120px rgba(115,89,255,.15); border-color: rgba(115,89,255,.14);}
}
.header{ padding: 24px 26px 14px; }
h1{
  margin:0;
  letter-spacing:-.03em;
  font-size: clamp(28px, 4vw, 44px);
  line-height: 1.05;
}
.sub{
  margin:10px 0 0;
  color: var(--muted);
  font-size: 14px;
}
.controls{
  display:flex;
  gap: 12px;
  padding:0 26px 20px;
  flex-wrap: wrap;
}
input[type="text"]{
  flex: 1 1 300px;
  min-width: 0;
  padding: 11px 12px;
  border-radius: 14px;
  border:1px solid rgba(12,10,26,.14);
  background: rgba(255,255,255,.55);
  outline: none;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.65);
  transition: box-shadow .15s ease, transform .15s ease;
}
input[type="text"]:focus{
  box-shadow: 0 0 0 4px rgba(115,89,255,.18);
}
button{
  border: 1px solid rgba(12,10,26,.14);
  background: rgba(255,255,255,.70);
  border-radius: 14px;
  padding: 10px 12px;
  cursor: pointer;
  transition: transform .12s cubic-bezier(.2,.9,.2,1), box-shadow .12s ease;
}
button:hover{ transform: translateY(-1px); }
button:active{ transform: translateY(0px) scale(.99);}
button.primary{
  border-color: rgba(0,210,106,.30);
  background: linear-gradient(180deg, rgba(0,210,106,.20), rgba(255,255,255,.70));
}
button.danger{
  border-color: rgba(255,0,0,.20);
  background: linear-gradient(180deg, rgba(255,0,0,.10), rgba(255,255,255,.70));
}
.list{ margin:0; padding: 0 26px 26px; list-style:none; }
.todo{
  position: relative;
  border-radius: 18px;
  border: 1px solid rgba(12,10,26,.10);
  background: rgba(255,255,255,.70);
  margin-top: 12px;
  padding: 12px 12px;
  display:flex;
  gap: 12px;
  align-items:flex-start;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.75), 0 18px 70px rgba(12,10,26,.06);
  animation: pop .28s ease-out, cardGlow 6s ease-in-out infinite;
}
@keyframes pop{
  from{ transform: translateY(6px) scale(.98); opacity:0;}
  to{ transform: translateY(0) scale(1); opacity:1;}
}
@keyframes bye{
  to{ transform: translateY(6px) scale(.98); opacity:0;}
}
@keyframes cardGlow{
  0%,100%{ box-shadow: inset 0 1px 0 rgba(255,255,255,.80), 0 18px 70px rgba(12,10,26,.06); border-color: rgba(12,10,26,.10); }
  50%{ box-shadow: inset 0 1px 0 rgba(255,255,255,.85), 0 20px 95px rgba(0,179,255,.14); border-color: rgba(0,179,255,.18); }
}
.todo::before{
  content:"";
  position:absolute;
  inset:-1px;
  border-radius: inherit;
  background: linear-gradient(90deg, rgba(255,255,255,.0), rgba(115,89,255,.22), rgba(0,179,255,.16), rgba(255,255,255,.0));
  transform: translateX(-70%);
  opacity: 0;
}
.todo.done::before{ animation: shimmer 1.2s linear; }
@keyframes shimmer{
  0%{ transform: translateX(-70%); opacity: 0;}
  12%{ opacity: .85;}
  100%{ transform: translateX(70%); opacity: 0;}
}
.todo.done{ background: rgba(255,255,255,.58); color: rgba(12,10,26,.75); }
.todo.done .text{ text-decoration: line-through; opacity:.8; }
.todo.done .dot{
  border-color: rgba(0,210,106,.55);
  background: radial-gradient(circle, rgba(0,210,106,.7), rgba(255,255,255,.0) 45%);
}
.todo .left{ display:flex; gap: 12px; flex:1; align-items:flex-start; }
.dot{
  width: 18px;
  height: 18px;
  border-radius: 999px;
  border: 2px solid rgba(12,10,26,.20);
  flex:0 0 auto;
  margin-top: 2px;
  animation: dotPulse 3s ease-in-out infinite;
}
@keyframes dotPulse{
  0%,100%{ transform: scale(1); opacity:.9;}
  50%{ transform: scale(1.15); opacity:1;}
}
.text{ flex:1; word-break: break-word; }
.btns{ display:flex; gap: 8px; }
.toast{
  position:fixed;
  left:50%;
  bottom: 18px;
  transform: translateX(-50%);
  padding: 8px 12px;
  border-radius: 999px;
  border: 1px solid rgba(12,10,26,.10);
  background: rgba(255,255,255,.72);
  backdrop-filter: blur(10px);
  box-shadow: 0 18px 70px rgba(12,10,26,.16);
  opacity: 0;
  pointer-events:none;
  font-size: 13px;
}
.toast.show{ animation: toastIn .7s ease; }
@keyframes toastIn{
  0%{ opacity:0; transform: translateX(-50%) translateY(8px); }
  40%{ opacity:1; transform: translateX(-50%) translateY(0); }
  100%{ opacity:0; transform: translateX(-50%) translateY(0);}
}
.cursor{
  position: fixed;
  width: 30px;
  height: 30px;
  border-radius: 999px;
  pointer-events:none;
  left: var(--mx);
  top: var(--my);
  transform: translate(-50%, -50%);
  border: 2px solid rgba(12,10,26,.16);
  mix-blend-mode: multiply;
  opacity:.9;
  transition: opacity .2s ease;
}
.cursor::after{
  content:"";
  position:absolute;
  inset:-8px;
  border-radius: inherit;
  border: 1px dashed rgba(12,10,26,.22);
  opacity:.7;
  animation: cursorPulse .9s ease-in-out infinite;
}
@keyframes cursorPulse{
  0%,100%{ transform: scale(1);}
  50%{ transform: scale(1.15);}
}
.cursor.hide{ opacity:.0;}
@media (prefers-reduced-motion: reduce){
  body, body::before, body::after{ animation-duration: 999s !important; }
  .stage{ animation:none; }
  .todo{ animation: pop .12s ease-out; }
  .cursor::after{ animation:none; }
  .dot{ animation:none; }
}
</style>
</head>
<body>
<div class="cursor" aria-hidden="true"></div>
<main>
  <section class="stage" aria-label="TODO Playground">
    <div class="header">
      <h1>TODO Editions</h1>
      <p class="sub">奇抜に、でも使えるTODO。Addで追加、クリックでDONE/UNDO、×で削除、Clearで全削除。Hでテーマ。</p>
    </div>
    <div class="controls">
      <input id="todoInput" type="text" placeholder="タスクを追加..." autocomplete="off" />
      <button class="primary" id="addBtn">Add</button>
      <button class="danger" id="clearBtn">Clear</button>
      <button id="themeBtn" title="Hでも切替できます">Theme</button>
    </div>
    <ul id="list" class="list"></ul>
  </section>
</main>
<div id="toast" class="toast" aria-live="polite"></div>
<script>
const input = document.getElementById("todoInput");
const addBtn = document.getElementById("addBtn");
const clearBtn = document.getElementById("clearBtn");
const list = document.getElementById("list");
const toast = document.getElementById("toast");
const cursor = document.querySelector(".cursor");
const root = document.documentElement;
const themeBtn = document.getElementById("themeBtn");

const palettes = [
  ["#00d26a","#7359ff","#00b3ff","#f7f5ff","#fbfaff"],
  ["#ff4ec3","#5f9dff","#ffd23f","#fff8fb","#f5fbff"],
  ["#72ffb5","#ff7ce1","#61d8ff","#f0fbff","#fff7fb"]
];
let p = 0;

function showToast(msg){
  if(!toast) return;
  toast.textContent = msg;
  toast.classList.remove("show");
  void toast.offsetWidth;
  toast.classList.add("show");
}

function applyTheme(){
  const colors = palettes[p];
  root.style.setProperty("--accent", colors[0]);
  root.style.setProperty("--a2", colors[1]);
  root.style.setProperty("--a3", colors[2]);
  root.style.setProperty("--bg0", colors[3]);
  root.style.setProperty("--bg1", colors[4]);
}
applyTheme();

function save(){
  const items = [...list.children].map(li=>{
    return { t: li.querySelector(".text").textContent || "", d: li.classList.contains("done") };
  });
  localStorage.setItem("editions_todos", JSON.stringify(items));
}

function addTask(text, done=false){
  const trimmed = (text || "").trim();
  if(!trimmed) return;

  const li = document.createElement("li");
  li.className = "todo";
  li.innerHTML = `
    <div class="left">
      <div class="dot" aria-hidden="true"></div>
      <div class="text"></div>
    </div>
    <div class="btns">
      <button class="danger del" aria-label="Delete">×</button>
    </div>
  `;
  li.querySelector(".text").textContent = trimmed;
  if(done) li.classList.add("done");
  list.appendChild(li);
  save();
}

function load(){
  const stored = JSON.parse(localStorage.getItem("editions_todos") || "[]");
  stored.forEach(item => addTask(item.t, !!item.d));
}
load();

function onAdd(){
  addTask(input.value);
  input.value = "";
  showToast("ADDED");
}

addBtn.addEventListener("click", onAdd);
input.addEventListener("keydown", e=>{
  if(e.key === "Enter") onAdd();
});

clearBtn.addEventListener("click", ()=>{
  if(!confirm("全部消しますか？")) return;
  list.innerHTML = "";
  save();
  showToast("CLEARED");
});

list.addEventListener("click", e=>{
  const del = e.target.closest(".del");
  const todo = e.target.closest(".todo");
  if(del && todo){
    todo.style.animation = "bye .26s ease, cardGlow 6s ease-in-out infinite";
    setTimeout(()=>todo.remove(), 180);
    save();
    showToast("DELETED");
    return;
  }
  if(todo && e.target.closest(".left")){
    todo.classList.toggle("done");
    save();
    showToast(todo.classList.contains("done") ? "DONE" : "UNDO");
  }
});

document.addEventListener("pointermove", e=>{
  root.style.setProperty("--mx", `${e.clientX}px`);
  root.style.setProperty("--my", `${e.clientY}px`);
  cursor?.classList.remove("hide");
  const { innerWidth: w, innerHeight: h } = window;
  const x = (e.clientX / w - .5) * 2;
  const y = (e.clientY / h - .5) * 2;
  root.style.setProperty("--rY", `${x*14}deg`);
  root.style.setProperty("--rX", `${-y*11}deg`);
});

document.addEventListener("keydown", e=>{
  if(e.key.toLowerCase() === "h"){
    p = (p + 1) % palettes.length;
    applyTheme();
    showToast(`THEME ${p+1}`);
  }
});

themeBtn?.addEventListener("click", ()=>{
  p = (p + 1) % palettes.length;
  applyTheme();
  showToast(`THEME ${p+1}`);
});

document.addEventListener("pointerleave", ()=>cursor?.classList.add("hide"));
</script>
</body>
</html>
