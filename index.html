<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><title>TODO Nebula</title><style>:root{--bg0:#060414;--bg1:#0a0632;--fg:#eaf0ff;--muted: rgba(234,240,255,.72);--card: rgba(255,255,255,.07);--card2: rgba(255,255,255,.12);--stroke: rgba(255,255,255,.16);--shadow: 0 20px 90px rgba(0,0,0,.5);--mx:50vw;--my:50vh;--rX:0deg;--rY:0deg;--accent:#8d7bff;--accent2:#45e6ff;--accent3:#ff5ef2;}*{box-sizing:border-box}html,body{height:100%}body{margin:0;font-family: ui-sans-serif, system-ui, -apple-system, "SF Pro Display", Roboto, "Segoe UI", Arial;color:var(--fg);overflow:hidden}.bg{position:fixed;inset:-40px;background:radial-gradient(1400px 900px at 30% 0%, rgba(141,123,255,.65), transparent 55%),radial-gradient(1200px 800px at 90% 30%, rgba(69,230,255,.55), transparent 60%),radial-gradient(1200px 900px at 20% 90%, rgba(255,94,242,.45), transparent 65%),linear-gradient(180deg, var(--bg0), var(--bg1));filter: blur(0px);animation:bgHue 18s ease-in-out infinite alternate}.bg::after{content:"";position:absolute;inset:-30%;background:url(data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='3' stitchTiles='stitch'/></filter><rect width='160' height='160' filter='url(#n)' opacity='.22'/></svg>);opacity:.18;mix-blend-mode: overlay;animation:noise 1.6s steps(10) infinite}.loader{position:fixed;inset:0;display:grid;place-items:center;background:linear-gradient(180deg, rgba(6,4,20,.95), rgba(10,6,50,.92));z-index:50;animation:fadeOut 1.2s ease forwards;animation-delay:1100ms}.spinner{width:56px;height:56px;border-radius:50%;border:2px solid rgba(234,240,255,.2);border-top-color: rgba(255,94,242,.9);border-right-color: rgba(69,230,255,.9);animation:spin 1s linear infinite}.scene{position:absolute;inset:0;pointer-events:none;transform-style: preserve-3d}.cube{position:absolute;width:22px;height:22px;background: linear-gradient(180deg, rgba(255,255,255,.25), rgba(255,255,255,.03));border: 1px solid rgba(255,255,255,.16);box-shadow: 0 18px 40px rgba(0,0,0,.4);transform: translateZ(var(--z, 0));border-radius: 6px;backdrop-filter: blur(6px);animation: cubeFloat var(--t,9s) ease-in-out infinite;opacity: .35}.shell{position:relative;max-width: 980px;padding: 28px 24px;margin: 0 auto;height:100%;display:flex;flex-direction:column}.header{position:relative;z-index:5;margin-top: 34px;display:flex;align-items:flex-start;justify-content:space-between;gap:18px}.title{font-size: clamp(30px, 4vw, 48px);font-weight: 700;letter-spacing: .2px;line-height:1.06;margin:0;display:flex;flex-direction:column}.title small{font-weight: 500;font-size: 14px;color: var(--muted);margin-top: 8px}.controls{display:flex;gap:10px;align-items:center}.chip{border-radius: 999px;padding: 10px 12px;background: rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);box-shadow: 0 14px 35px rgba(0,0,0,.4);backdrop-filter: blur(10px);user-select:none}.stage{margin-top: 18px;position:relative;z-index:5;padding: 18px;border-radius: 20px;background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.05));border: 1px solid rgba(255,255,255,.16);box-shadow: var(--shadow);transform-style: preserve-3d;transform: rotateX(var(--rX)) rotateY(var(--rY));will-change: transform}.stage::before{content:"";position:absolute;inset:-2px;border-radius: 22px;pointer-events:none;background: linear-gradient(90deg, rgba(141,123,255,.8), rgba(69,230,255,.8), rgba(255,94,242,.8));opacity:.55;mix-blend-mode: overlay;filter: blur(.1px);transform: translateZ(0);animation: stagePulse 3.6s ease-in-out infinite}.stage:hover::before{opacity:.85}.topbar{display:flex;gap: 10px;flex-wrap:wrap;align-items:center}input[type="text"]{flex:1;min-width: 220px;padding: 12px 12px;border-radius: 14px;border: 1px solid rgba(255,255,255,.16);background: rgba(0,0,0,.15);color: var(--fg);outline:none;box-shadow: inset 0 1px 0 rgba(255,255,255,.08)}input[type="text"]::placeholder{color: rgba(234,240,255,.45)}button{cursor:pointer;border-radius: 14px;padding: 12px 12px;border:1px solid rgba(255,255,255,.16);color:var(--fg);background: rgba(255,255,255,.08);box-shadow: 0 14px 35px rgba(0,0,0,.35);backdrop-filter: blur(8px);transition: transform .16s ease, background .2s ease, border-color .2s ease, box-shadow .2s ease}button:hover{transform: translateY(-1px) scale(1.02);background: rgba(255,255,255,.12);border-color: rgba(255,255,255,.28)}button:active{transform: translateY(1px) scale(.98)}.btnPrimary{border: none;background: linear-gradient(90deg, rgba(141,123,255,.95), rgba(69,230,255,.95));color:#0c081a;font-weight: 700}.btnPrimary:hover{box-shadow: 0 18px 60px rgba(69,230,255,.35)}.grid{margin-top: 16px;display:grid;grid-template-columns: repeat(12, minmax(0, 1fr));gap: 14px}.todo{grid-column: span 6;position:relative;padding: 16px 14px;border-radius: 16px;background: rgba(0,0,0,.12);border:1px solid rgba(255,255,255,.14);box-shadow: 0 14px 50px rgba(0,0,0,.35);backdrop-filter: blur(10px);transform: translateZ(0);animation: pop .28s cubic-bezier(.2,.7,.2,1);overflow:hidden}.todo:nth-child(3n+1){grid-column: span 7}.todo:nth-child(4n+2){grid-column: span 5}.todoTitle{margin:0;font-weight: 650;letter-spacing:.2px}.todoMeta{margin-top: 6px;font-size: 12px;color: var(--muted);display:flex;align-items:center;justify-content:space-between;gap:10px}.metaBubble{padding: 6px 8px;border-radius: 999px;border: 1px solid rgba(255,255,255,.16);background: rgba(255,255,255,.06)}.actions{margin-top: 12px;display:flex;gap:10px}.done .todoTitle{text-decoration: line-through;text-decoration-color: rgba(69,230,255,.95);text-decoration-thickness: 2px;opacity:.78}.done .todo::after{content:"";position:absolute;inset:0;pointer-events:none;background: linear-gradient(120deg, transparent 20%, rgba(69,230,255,.35) 35%, rgba(255,94,242,.40) 58%, transparent 74%);transform: translateX(-100%) skewX(-20deg);animation: shimmer .9s ease-out forwards}.toast{position:fixed;left:50%;bottom:20px;transform: translateX(-50%);z-index:70;pointer-events:none;opacity:0;padding: 10px 12px;border-radius: 999px;background: rgba(0,0,0,.45);border: 1px solid rgba(255,255,255,.14);backdrop-filter: blur(10px);box-shadow: 0 18px 60px rgba(0,0,0,.45)}.toast.show{animation: toastIn .7s ease}.cursor{position:fixed;inset:0;pointer-events:none;z-index:80}.cursor::before{content:"";position:absolute;width:10px;height:10px;border-radius:999px;background: rgba(69,230,255,.95);box-shadow: 0 0 0 10px rgba(69,230,255,.15);transform: translate(-50%,-50%);left: var(--mx);top: var(--my)}.cursor::after{content:"";position:absolute;width:48px;height:48px;border-radius:999px;border: 1px solid rgba(255,255,255,.12);box-shadow: 0 22px 80px rgba(0,0,0,.45);backdrop-filter: blur(10px);transform: translate(-50%,-50%) translateZ(0);left: var(--mx);top: var(--my);animation: cursorPulse 2.4s ease-in-out infinite;opacity:.35}@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}@keyframes bgHue{0%{filter:hue-rotate(0deg)}100%{filter:hue-rotate(44deg)}}@keyframes spin{to{transform:rotate(360deg)}}@keyframes noise{0%{transform: translate(0,0)}100%{transform: translate(-10%,8%)}}@keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0;visibility:hidden}}@keyframes cubeFloat{0%,100%{transform: translateZ(var(--z)) translate(0,0)}50%{transform: translateZ(calc(var(--z) + 60px)) translate(18px,-16px)}}@keyframes pop{0%{transform: translateY(8px) scale(.98);opacity:0}100%{transform: translateY(0) scale(1);opacity:1}}@keyframes stagePulse{0%,100%{opacity:.20}50%{opacity:.65}}@keyframes cursorPulse{0%,100%{transform: translate(-50%,-50%) scale(1)}50%{transform: translate(-50%,-50%) scale(1.12)}}@keyframes shimmer{from{transform: translateX(-100%) skewX(-20deg)}to{transform: translateX(120%) skewX(-20deg)}}@keyframes toastIn{0%{opacity:0;transform: translateX(-50%) translateY(10px) scale(.98)}35%{opacity:1;transform: translateX(-50%) translateY(0) scale(1)}100%{opacity:0;transform: translateX(-50%) translateY(0) scale(1)}}</style></head><body><div class="loader" id="loader" aria-label="loading"><div class="spinner"></div></div><div class="bg"></div><div class="scene" aria-hidden="true" id="scene"></div><div class="shell"><div class="header"><div class="title">TODO Nebula<small>奇抜：カーソルで傾く宇宙ステージ。Hでテーマ循環。</small></div><div class="controls"><div class="chip">Tasks: <span id="count">0</span></div><button id="theme" class="chip" style="border-color:rgba(255,255,255,.22)">Theme</button><button id="clear" class="chip">Reset</button></div></div><div class="stage" id="stage"><div class="topbar"><input id="input" type="text" placeholder="宇宙に投げるタスク..." autocomplete="off" /><button class="btnPrimary" id="add">ADD</button></div><div class="grid" id="grid"></div></div></div><div class="toast" id="toast"></div><div class="cursor" aria-hidden="true"></div><script>const KEYS = ["nebula_tasks","nebula_theme"];const input = document.getElementById("input");const add = document.getElementById("add");const grid = document.getElementById("grid");const countEl = document.getElementById("count");const toast = document.getElementById("toast");const themeBtn = document.getElementById("theme");const clearBtn = document.getElementById("clear");const stage = document.getElementById("stage");const root = document.documentElement;const themes = [["#8d7bff","#45e6ff","#ff5ef2"],["#ff7a7a","#ffd56a","#6cffb2"],["#66a8ff","#ffd1ff","#75ffea"],["#ff77d9","#77fff7","#f3ff7a"]];let themeIndex = Number(localStorage.getItem(KEYS[1]) || 0) % themes.length;let tasks = [];function load(){try{const saved = localStorage.getItem(KEYS[0]);tasks = saved ? JSON.parse(saved) : [];}catch(e){tasks = []; }tasks.forEach(t => makeCard(t));syncCount();}function save(){localStorage.setItem(KEYS[0], JSON.stringify(tasks));}function syncCount(){countEl.textContent = tasks.length;}function showToast(msg){toast.textContent = msg;toast.classList.remove("show");void toast.offsetWidth;toast.classList.add("show");}function randomId(){return Math.random().toString(16).slice(2) + "-" + Date.now().toString(16);}function stamp(){return new Date().toLocaleString();}function makeCard(task){const el = document.createElement("div");el.className = "todo";el.dataset.id = task.id;if(task.done) el.classList.add("done");el.innerHTML = `<p class="todoTitle">${escapeHtml(task.text)}</p><div class="todoMeta"><span class="metaBubble">${task.done ? "Completed" : "Active"}</span><span>${task.time}</span></div><div class="actions"><button class="btnPrimary doneBtn">${task.done ? "UNDO" : "DONE"}</button><button class="chip delBtn">DELETE</button></div>`;grid.appendChild(el);el.querySelector(".doneBtn").addEventListener("click", () => toggleDone(task.id, el));el.querySelector(".delBtn").addEventListener("click", () => remove(task.id, el));}function addTask(){const text = input.value.trim();if(!text) return showToast("空は拾えない。入力して！");const t = { id: randomId(), text, done:false, time:stamp() };tasks.push(t);makeCard(t);syncCount();save();showToast("ADD : " + text);input.value = "";input.focus();}function toggleDone(id, el){const idx = tasks.findIndex(x=>x.id===id);if(idx<0) return;tasks[idx].done = !tasks[idx].done;el.classList.toggle("done");const badge = el.querySelector(".metaBubble");const btn = el.querySelector(".doneBtn");if(tasks[idx].done){badge.textContent="Completed";btn.textContent="UNDO";showToast("DONE");}else{badge.textContent="Active";btn.textContent="DONE";showToast("UNDO");}save();}function remove(id, el){el.style.opacity="0";el.style.transform="translateY(8px) scale(.96)";setTimeout(() => {tasks = tasks.filter(x=>x.id!==id);el.remove();syncCount();save();}, 160);showToast("DELETE");}function escapeHtml(str){const div = document.createElement("div");div.textContent = str;return div.innerHTML;}function applyTheme(i){themeIndex = i;localStorage.setItem(KEYS[1], themeIndex);const t = themes[i];root.style.setProperty("--accent", t[0]);root.style.setProperty("--accent2", t[1]);root.style.setProperty("--accent3", t[2]);}applyTheme(themeIndex);add.addEventListener("click", addTask);input.addEventListener("keypress", (e) => { if(e.key === "Enter") addTask(); });themeBtn.addEventListener("click", () => {applyTheme((themeIndex + 1) % themes.length);showToast("THEME : " + (themeIndex+1));});document.addEventListener("keydown", (e)=>{if(e.key.toLowerCase() === "h"){themeBtn.click();}});clearBtn.addEventListener("click", ()=>{if(!confirm("リセットして宇宙を真っ白にしますか？")) return;tasks = [];grid.innerHTML = "";syncCount();save();showToast("RESET");});document.addEventListener("pointermove", (e)=>{root.style.setProperty("--mx", e.clientX+"px");root.style.setProperty("--my", e.clientY+"px");const x = (e.clientX / window.innerWidth - 0.5);const y = (e.clientY / window.innerHeight - 0.5);root.style.setProperty("--rY", (x * 18)+"deg");root.style.setProperty("--rX", (-y * 16)+"deg");});window.addEventListener("load", () => {setTimeout(()=>{const loader = document.getElementById("loader");if(loader) loader.style.display="none";}, 1600);});const scene = document.getElementById("scene");const cubeCount = 28;for(let i=0;i<cubeCount;i++){const c = document.createElement("div");c.className = "cube";c.style.setProperty("--z", (-20 + Math.random()*220) + "px");c.style.left = (Math.random()*100) + "%";c.style.top = (Math.random()*100) + "%";const t = 6 + Math.random()*9;c.style.setProperty("--t", t+"s");scene.appendChild(c);}load();</script></body></html>
