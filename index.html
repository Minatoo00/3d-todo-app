<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TODO Editions</title>
  <style>
:root{
  --bg:#f7f5ff;
  --fg:#0c0a1a;
  --muted: rgba(12,10,26,.65);
  --muted2: rgba(12,10,26,.45);
  --card: rgba(255,255,255,.72);
  --card2: rgba(255,255,255,.50);
  --stroke: rgba(12,10,26,.08);
  --shadow: 0 20px 60px rgba(12,10,26,.10);
  --accent:#00d26a;
  --a2:#7359ff;
  --a3:#00b3ff;
}
*{box-sizing:border-box;}
html,body{height:100%}
body{
  margin:0;
  background:
    radial-gradient(600px 420px at 12% 12%, rgba(0,210,106,.24), transparent 55%),
    radial-gradient(620px 460px at 88% 20%, rgba(115,89,255,.18), transparent 60%),
    radial-gradient(760px 520px at 40% 100%, rgba(0,179,255,.16), transparent 55%),
    linear-gradient(180deg, #ffffff 0%, #f7f5ff 100%);
  color: var(--fg);
  font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica Neue, Arial, Noto Sans Japanese, Noto Sans, sans-serif;
  overflow-x:hidden;
  animation: hue 18s linear infinite alternate;
}
@keyframes hue {from{filter:hue-rotate(0deg)} to{filter:hue-rotate(16deg)}}
@media (prefers-reduced-motion: reduce){ body{animation:none!important; filter:none!important} }

.wrap{
  min-height:100%;
  padding: 44px 26px 24px;
  max-width: 1080px;
  margin: 0 auto;
}
.masthead{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap: 20px;
  margin-bottom: 18px;
}
.title{
  margin:0;
  font-size: clamp(34px, 6vw, 64px);
  letter-spacing:-.02em;
}
.sub{
  margin: 10px 0 0;
  color: var(--muted);
  line-height: 1.5;
  max-width: 64ch;
}
.controls{
  display:flex;
  align-items:center;
  gap: 10px;
  flex-wrap:wrap;
}
.chip{
  padding: 9px 11px;
  border-radius: 999px;
  background: rgba(12,10,26,.04);
  border: 1px solid rgba(12,10,26,.08);
  color: var(--muted);
  font-size: 13px;
  display:flex;
  align-items:center;
  gap: 8px;
}

.stage{
  margin-top: 6px;
  padding: 18px;
  border-radius: 18px;
  background: linear-gradient(180deg, rgba(255,255,255,.65), rgba(255,255,255,.45));
  border: 1px solid rgba(12,10,26,.08);
  box-shadow: var(--shadow);
  backdrop-filter: blur(8px);
}

.inputrow{
  display:flex;
  align-items:center;
  gap: 10px;
  flex-wrap:wrap;
}
input[type=text]{
  flex:1 1 540px;
  padding: 12px 14px;
  border-radius: 12px;
  border: 1px solid rgba(12,10,26,.12);
  background: rgba(255,255,255,.85);
  outline:none;
  font-size: 14px;
  color: var(--fg);
  box-shadow: 0 12px 40px rgba(12,10,26,.06);
  transition: box-shadow .2s ease, border .2s ease;
}
input[type=text]:focus{
  border-color: rgba(0,210,106,.65);
  box-shadow: 0 0 0 6px rgba(0,210,106,.10);
}
.btn{
  border:0;
  border-radius: 999px;
  padding: 11px 14px;
  font-weight: 800;
  letter-spacing:.02em;
  cursor:pointer;
  color:#071114;
  background: radial-gradient(140px 80px at 35% 20%, rgba(255,255,255,.9), transparent 60%),
    linear-gradient(90deg, var(--accent), var(--a2), var(--a3));
  box-shadow: 0 18px 60px rgba(12,10,26,.18);
  transition: transform .15s ease, filter .2s ease;
}
.btn:hover{filter: saturate(1.05) contrast(1.03)}
.btn:active{transform: translateY(1px) scale(.99)}
.btnghost{
  background: rgba(12,10,26,.04);
  color: var(--fg);
  border: 1px solid rgba(12,10,26,.10);
}

.list{
  list-style:none;
  padding:0;
  margin: 18px 0 0;
  display:grid;
  gap: 12px;
}
.todo{
  display:grid;
  grid-template-columns: auto 1fr auto auto;
  gap: 12px;
  align-items:center;
  padding: 13px 13px;
  border-radius: 16px;
  background: linear-gradient(180deg, rgba(255,255,255,.72), rgba(255,255,255,.45));
  border: 1px solid rgba(12,10,26,.08);
  box-shadow: 0 16px 46px rgba(12,10,26,.08);
  position:relative;
  overflow:hidden;
  animation: pop .45s cubic-bezier(.2,.9,.2,1);
}
.todo:hover{ border-color: rgba(0,210,106,.18); }
@keyframes pop{from{opacity:0; transform: translateY(12px)} to{opacity:1; transform: translateY(0)}}

.dot{
  width: 10px;
  height: 10px;
  border-radius: 999px;
  background: radial-gradient(circle at 30% 20%, #fff, var(--accent) 55%, var(--a2) 100%);
  box-shadow: 0 0 0 3px rgba(0,210,106,.12);
}
.t{ margin:0; font-weight: 900; letter-spacing:.01em; }
.meta{ grid-column: 2 / -1; font-size: 12px; color: var(--muted2); margin: 0 }
.todo.done{ background: linear-gradient(180deg, rgba(255,255,255,.55), rgba(255,255,255,.36)); }
.todo.done .t{ text-decoration: line-through; color: rgba(12,10,26,.65); font-weight:700 }

.icon{
  background: rgba(12,10,26,.04);
  border: 1px solid rgba(12,10,26,.10);
  color: var(--fg);
  border-radius: 12px;
  padding: 8px 10px;
  cursor:pointer;
  transition: transform .15s ease, filter .2s ease, background .2s ease;
}
.icon:hover{ filter: saturate(1.05); background: rgba(12,10,26,.055) }
.icon:active{ transform: translateY(1px) }

.toast{
  position:fixed;
  left: 50%;
  bottom: 16px;
  transform: translateX(-50%);
  padding: 10px 14px;
  border-radius: 999px;
  border: 1px solid rgba(12,10,26,.10);
  background: rgba(12,10,26,.82);
  color: rgba(255,255,255,.92);
  font-size: 13px;
  opacity:0;
  pointer-events:none;
}
.toast.show{ animation: toast .6s cubic-bezier(.2,.9,.2,1); }
@keyframes toast{0%{opacity:0; transform: translateX(-50%) translateY(10px)} 40%{opacity:1; transform: translateX(-50%) translateY(0)} 100%{opacity:0; transform: translateX(-50%) translateY(0)}}

.footer{
  margin-top: 20px;
  color: rgba(12,10,26,.35);
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
  font-size: 12px;
  letter-spacing:.08em;
}
  </style>
</head>
<body>
  <div class="wrap">
    <header class="masthead">
      <div>
        <h1 class="title">TODO Editions</h1>
        <p class="sub">Shopify Editions風の、「軽さ」と「余白」の美学を解釈して再構成したTODO。状態変化は短く、気持ちよく。</p>
      </div>
      <div class="controls">
        <span class="chip">🗂 <span id="count">0</span> tasks</span>
      </div>
    </header>

    <section class="stage">
      <div class="controls" style="justify-content:space-between;">
        <div class="inputrow">
          <input id="taskInput" type="text" placeholder="タスクを入力して Enter / Add..." autocomplete="off" />
          <button class="btn btnghost" id="clearBtn">CLEAR</button>
          <button class="btn" id="addBtn">ADD</button>
        </div>
      </div>
      <ul class="list" id="list"></ul>
    </section>

    <div class="footer">EDITIONS TODO</div>
  </div>
  <div class="toast" id="toast" aria-live="polite"></div>

  <script>
  const input = document.getElementById("taskInput");
  const addBtn = document.getElementById("addBtn");
  const clearBtn = document.getElementById("clearBtn");
  const list = document.getElementById("list");
  const count = document.getElementById("count");
  const toast = document.getElementById("toast");
  const STORAGE_KEY = "editions_todos";

  function nanoId(){ return Math.random().toString(16).slice(2) + "-" + Date.now().toString(16); }
  function fmt(ts){
    return new Date(Number(ts)).toLocaleString("ja-JP", {weekday:"short", hour:"2-digit", minute:"2-digit"});
  }

  function showToast(msg){
    toast.textContent = msg;
    toast.classList.remove("show");
    void toast.offsetWidth;
    toast.classList.add("show");
  }

  function save(){
    const tasks = [...list.children].map(li => ({
      id: li.dataset.id,
      text: li.querySelector(".t").textContent,
      done: li.classList.contains("done"),
      createdAt: li.dataset.createdAt
    }));
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    count.textContent = tasks.length;
  }

  function addTask(text, done=false, id=nanoId(), createdAt=Date.now()){
    const t = (text||"").trim();
    if(!t) return;

    const li = document.createElement("li");
    li.className = "todo" + (done ? " done" : "");
    li.dataset.id = id;
    li.dataset.createdAt = createdAt;

    li.innerHTML = `
      <span class="dot" aria-hidden="true"></span>
      <p class="t"></p>
      <button class="icon" title="Done/Undone" aria-label="完了切替">✓</button>
      <button class="icon" title="Delete" aria-label="削除">✕</button>
      <p class="meta">${fmt(createdAt)}</p>
    `;
    li.querySelector(".t").textContent = t;

    const doneBtn = li.children[2];
    const delBtn = li.children[3];

    doneBtn.addEventListener("click", () => {
      li.classList.toggle("done");
      showToast(li.classList.contains("done") ? "DONE" : "UNDO");
      save();
    });

    delBtn.addEventListener("click", () => {
      li.remove();
      showToast("REMOVED");
      save();
    });

    list.prepend(li);
    input.value="";
    input.focus();
    showToast("ADDED");
    save();
  }

  function load(){
    try{
      const tasks = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      tasks.forEach(t => addTask(t.text, t.done, t.id, t.createdAt));
    }catch(e){ console.warn(e); }
    finally{ save(); }
  }

  addBtn.addEventListener("click", () => addTask(input.value));
  input.addEventListener("keydown", (e)=>{
    if(e.key === "Enter") addTask(input.value);
    if(e.key === "Escape") input.blur();
  });

  clearBtn.addEventListener("click", () => {
    if(confirm("すべてのタスクを消しますか？")){
      list.innerHTML="";
      showToast("CLEARED");
      save();
    }
  });

  load();
  </script>
</body>
</html>
